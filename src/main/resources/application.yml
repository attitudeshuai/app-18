server:
  port: 8088

spring:
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:mysql://${DB_HOST:localhost}:${DB_PORT:3306}/${DB_NAME:babygearpass}?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC}
    username: ${DB_USER:app_user}
    password: ${DB_PASSWORD:app_pass}
    driver-class-name: com.mysql.cj.jdbc.Driver
    hikari:
      connection-timeout: 30000
      initialization-fail-timeout: -1
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    defer-datasource-initialization: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQLDialect
  sql:
    init:
      mode: always
      data-locations: classpath:data.sql
      encoding: UTF-8

jwt:
  secret: ${JWT_SECRET:YmFieUdlYXJQYXNzU2VjcmV0S2V5Rm9ySldUVG9rZW5HZW5lcmF0aW9uMjAyNA==}
  expiration: ${JWT_EXPIRATION:86400000}

springdoc:
  swagger-ui:
    path: /swagger-ui.html
  api-docs:
    path: /api-docs

management:
  endpoints:
    web:
      exposure:
        include: health
  endpoint:
    health:
      show-details: always

escrow:
  default-period-hours: 72
  auto-complete-after-period: true
  check-interval-ms: 60000

express:
  api:
    provider: ${EXPRESS_PROVIDER:mock}
    connect-timeout-ms: 5000
    read-timeout-ms: 10000
    retry-count: 2
    kuaidi100:
      enabled: ${KUAI_DI_100_ENABLED:false}
      customer: ${KUAI_DI_100_CUSTOMER:}
      key: ${KUAI_DI_100_KEY:}
      url: https://poll.kuaidi100.com/poll/query.do
      auto-detect-url: https://www.kuaidi100.com/autonumber/auto
    kuaidiniao:
      enabled: ${KUAI_DI_NIAO_ENABLED:false}
      e-business-id: ${KUAI_DI_NIAO_EBUSINESS_ID:}
      app-key: ${KUAI_DI_NIAO_APP_KEY:}
      url: https://api.kdniao.com/Ebusiness/EbusinessOrderHandle.aspx
      sandbox: false
    aliyun:
      enabled: ${ALIYUN_EXPRESS_ENABLED:false}
      app-code: ${ALIYUN_EXPRESS_APP_CODE:}
      url: https://wuliu.market.alicloudapi.com/kdi
