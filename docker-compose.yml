version: "3.8"

services:
  app:
    build: .
    container_name: babygearpass_app
    ports:
      - "8089:8088"
    environment:
      DB_HOST: mysql
      DB_PORT: 3306
      DB_NAME: babygearpass
      DB_USER: app_user
      DB_PASSWORD: app_pass
    depends_on:
      mysql:
        condition: service_healthy

  mysql:
    image: mysql:8.0.36
    container_name: babygearpass_mysql
    command: --default-authentication-plugin=mysql_native_password --innodb-buffer-pool-size=128M
    environment:
      MYSQL_ROOT_PASSWORD: root_pass
      MYSQL_DATABASE: babygearpass
      MYSQL_USER: app_user
      MYSQL_PASSWORD: app_pass
    ports:
      - "13313:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-proot_pass"]
      interval: 10s
      timeout: 10s
      retries: 15
      start_period: 120s

volumes:
  mysql_data:
